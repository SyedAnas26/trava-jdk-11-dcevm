name: "build-dcevm manually"
on:
  workflow_dispatch:
    inputs:
      dcevm_branch:
        description: 'dcevm branch'
        required: true
        default: 'dcevm11-jdk-11.0.15-adoptium'
      dcevm_tag:
        description: 'dcevm tag'
        required: true
        default: 'dcevm-11.0.15+1'

jobs:
  dcevm:
    runs-on: macos-11
    steps:
    - uses: actions/checkout@v2
    - uses: TravaOpenJDK/action-build-dcevm@v1
      id: buildJDK
      with:
        impl: dcevm
        javaToBuild: jdk11u
        dcevm_branch: ${{ github.event.inputs.dcevm_branch }}
        dcevm_tag: ${{ github.event.inputs.dcevm_tag }}
        arch: arm64  # Specify the architecture as arm64
    - run: ${{ steps.buildJDK.outputs.BuildJDKDir }}/bin/java -version
    - name: Commit build artifacts
      run: |
        mkdir -p build-artifacts
        cp -R ${{ github.workspace }}/temurin-build-dcevm/workspace/artifacts/* build-artifacts/
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add build-artifacts/*
        git commit -m "Add build artifacts for ${{ github.event.inputs.dcevm_tag }}"
    - name: Push changes
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
